server:
  port: 8080
  servlet:
    context-path: /hfmp-ykt/api

spring:
  application:
    name: ykt-backend
  main:
    allow-bean-definition-overriding: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  datasource:
    druid:
      driver-class-name: oracle.jdbc.OracleDriver
      # Oracle 11g 连接串：service name 用 /xxx，SID 用 :xxx（视实际部署而定）
      url: ${YKT_DB_URL:jdbc:oracle:thin:@127.0.0.1:1521/orcl}
      username: ${YKT_DB_USER:ykt}
      password: ${YKT_DB_PWD:ykt}
      initial-size: 2
      min-idle: 2
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      time-between-eviction-runs-millis: 60000
      stat-view-servlet:
        enabled: true
        login-username: admin
        login-password: admin

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.bosi.ykt.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
    jdbc-type-for-null: 'null'
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

ykt:
  jwt:
    secret: ${YKT_JWT_SECRET:dev_only_placeholder_set_YKT_JWT_SECRET_in_prod}
    expire-hours: 8
  upload:
    base-dir: ${YKT_UPLOAD_DIR:D:/ykt-data/uploads}
  system:
    name: 惠民惠农财政补贴"一卡通"管理模块

logging:
  level:
    com.bosi.ykt: debug
    com.bosi.ykt.mapper: debug
